name: Build LG Remote APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install npm packages
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Create signing keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/my-release-key.keystore \
            -alias lgremote \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=LG Remote,O=LG Remote,C=LV" \
            -storepass lgremote2024 \
            -keypass lgremote2024 \
            -noprompt

      - name: Build release APK (with JS bundled inside)
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/my-release-key.keystore \
            -Pandroid.injected.signing.store.password=lgremote2024 \
            -Pandroid.injected.signing.key.alias=lgremote \
            -Pandroid.injected.signing.key.password=lgremote2024 \
            --no-daemon
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LG-Remote-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
